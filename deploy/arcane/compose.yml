# ============================================================
# Arcane project: dianyssa-agent production
#
# Letakkan folder ini di Arcane Projects Directory, misalnya:
#   /opt/arcane/projects/dianyssa/
#
# Cara deploy dari Arcane UI:
#   1. Buat project baru → pilih folder ini (atau sync dari Git).
#   2. Isi Environment Variables di UI Arcane (semua variabel dari .env.example).
#   3. Klik Deploy/Up.
#
# Catatan: compose ini TIDAK menyertakan Caddy. Diasumsikan kamu sudah
# punya reverse proxy sendiri (misal Nginx Proxy Manager) yang mengarahkan
# domain ke port APP_HOST_PORT di server.
# ============================================================

services:
  app:
    image: ghcr.io/ferilee/dianyssa:${IMAGE_TAG:-latest}
    container_name: dianyssa-agent-arcane
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - sqlite_data:/app/data
    ports:
      # Expose app ke host pada port yang bisa kamu pilih.
      # Reverse proxy (NPM/Caddy/Traefik) akan mengarahkan domain ke port ini.
      - "${APP_HOST_PORT:-3010}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlite_data:
